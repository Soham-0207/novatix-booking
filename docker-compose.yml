version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: ticket-booking-mysql
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: ticket_booking
    volumes:
      - mysqldata:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: ticket-booking-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: ticket-booking-backend
    ports:
      - "5000:5000"
    environment:
      DB_HOST: mysql
      DB_USER: root
      DB_PASSWORD: root
      DB_NAME: ticket_booking
      DB_PORT: 3306
      REDIS_URL: redis://redis:6379
      JWT_SECRET: supersecretkeyforbookingapp
      PORT: 5000
      FORCE_DB_INIT: "true" # Forces initial seeding on startup
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build: ./frontend
    container_name: ticket-booking-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  mysqldata:
